<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Go SPA</title>
    </head>
    <body>
        <div id="app">
            <h1>Hello</h1>
            <button id="btn">Login</button>
            <p id="base64"></p>
            <button id="btn2">Get user</button>
            <p id="output2"></p>
            <button id="btn3">Refresh token</button>
        </div>

        <script>
            let base64 = "";
            let deviceID = "web"; // You can change this to a unique identifier for each device

            document
                .getElementById("btn")
                .addEventListener("click", async () => {
                    const res = await fetch("http://localhost:8080/api/token", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            email: "test@test.it",
                            password: "password",
                            deviceID: deviceID,
                        }),
                    });
                    const jsonRes = await res.json();

                    base64 = jsonRes.token;
                    document.getElementById("base64").textContent = base64;
                });
            document
                .getElementById("btn2")
                .addEventListener("click", async () => {
                    const res = await fetch("http://localhost:8080/api/user", {
                        method: "GET",
                        credentials: "include",
                        headers: {
                            Authorization: "Bearer " + base64,
                        },
                    });

                    const text = await res.text();
                    document.getElementById("output2").textContent = text;
                });

            document
                .getElementById("btn3")
                .addEventListener("click", async () => {
                    const res = await fetch(
                        "http://localhost:8080/api/refresh",
                        {
                            method: "POST",
                            credentials: "include",
                            headers: {
                                "Content-Type": "application/json",
                                Authorization: "Bearer " + base64,
                            },
                            body: JSON.stringify({
                                deviceID: deviceID,
                            }),
                        },
                    );
                    const jsonRes = await res.json();
                    base64 = jsonRes.token;
                    document.getElementById("base64").textContent = base64;
                });
        </script>
    </body>
</html>
