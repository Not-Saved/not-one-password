openapi: 3.0.3
info:
  title: User API
  version: 1.0.0
paths:
  /users:
    get:
      summary: List all users
      operationId: listUsers
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user:
    get:
      summary: Get current user
      operationId: getCurrentUser
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: User retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 401
                message: User not authenticated
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      summary: Create a new user
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created successfully
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/confirm:
    post:
      summary: Create a new user
      operationId: confirmUser
      parameters:
        - name: code
          in: query
          required: true
          description: Email confirmation code
          schema:
            type: string
      responses:
        "200":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /token:
    post:
      summary: Issue access and refresh tokens
      operationId: issueToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Tokens issued successfully
          headers:
            Set-Cookie:
              description: HttpOnly cookies for access and refresh tokens
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 401
                message: Invalid email or password
        "500":
          $ref: "#/components/responses/InternalServerError"

  /refresh:
    post:
      summary: Refresh access and refresh tokens
      operationId: refreshToken
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Tokens refreshed successfully
          headers:
            Set-Cookie:
              description: Updated HttpOnly cookies
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 401
                message: Invalid or expired refresh token
        "500":
          $ref: "#/components/responses/InternalServerError"

  /logout:
    post:
      summary: Logout current user
      operationId: logoutUser
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "204":
          description: Logout successful, tokens revoked
          headers:
            Set-Cookie:
              description: Updated HttpOnly cookies
              schema:
                type: string
        "401":
          description: Unauthorized, user not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                code: 401
                message: User not authenticated
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/vault:
    get:
      summary: Get current user's vault
      operationId: getUserVault
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Vault retrieved successfully
          content:
            multipart/form-data:
            schema:
              type: object
              properties:
                updatedAt:
                  type: integer
                  format: int64
                  description: Unix epoch timestamp (seconds since 1970-01-01T00:00:00Z)
                  example: 1678698245
                vault:
                  type: string
                  format: binary
                  description: The actual vault binary
        "401":
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Create or update current user's vault
      operationId: insertUserVault
      security:
        - BearerAuth: []
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "204":
          description: Vault stored successfully
        "401":
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /user/vault/poll:
    get:
      summary: Get current user's vault
      operationId: pollUserVault
      security:
        - BearerAuth: []
        - CookieAuth: []
      responses:
        "200":
          description: Vault retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - updatedAt
                properties:
                  updatedAt:
                    type: integer
                    format: int64
                    description: Unix epoch timestamp (seconds since 1970-01-01T00:00:00Z)
                    example: 1678698245
        "401":
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    CookieAuth:
      type: apiKey
      in: cookie
      name: SESSION_ID # cookie name

  schemas:
    UserResponse:
      type: object
      required:
        - id
        - username
        - email
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email

    CreateUserRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8

    ConfirmUserRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
        - deviceID
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        deviceID:
          type: string
          description: Unique identifier for the client device (used for token management)

    TokenResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: Base64 representation of the token

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          example: 500
        message:
          type: string
          example: Internal server error

  responses:
    BadRequest:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 400
            message: Missing required field 'name'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            code: 500
            message: Something went wrong on the server
